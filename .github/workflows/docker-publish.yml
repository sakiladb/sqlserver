name: Docker

on:
  push:
    branches: [ "master" ]
    # Numeric semver only - rejects typo'd tags like 'vfoo.bar.baz' which would
    # otherwise trigger a release build that emits no tags. The SQL Server year
    # to build is derived from the tag, e.g. v2019.0.0 builds SQL Server 2019
    # (see the "Determine SQL Server version" step).
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
    # Skip the build for changes that can't affect the built image. paths-ignore
    # is OR'd, so a commit touching only these files is skipped; a commit that
    # also touches a build-relevant file still runs.
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docker-run.sh'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docker-run.sh'
  # Manual build of an arbitrary version (smoke test only, never publishes).
  workflow_dispatch:
    inputs:
      mssql_version:
        description: "SQL Server year to build (e.g. 2019). Smoke test, no publish."
        required: false
        default: ""

# Cancel superseded in-progress runs on the same branch/PR; never cancel an
# in-flight tag (release) run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # login is only needed when we actually push (on tag pushes); gating it
  # here keeps PR/branch builds green, incl. Dependabot/fork PRs that have
  # no access to the registry secrets.
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
  # The newest SQL Server year: the single source of truth for which release
  # gets the `latest` tag. Bump this when releasing a new newest version.
  LATEST_VERSION: "2022"


# Third-party actions are SHA-pinned (with version comment) to defend
# against tag-move attacks on a compromised action repo. GitHub-owned
# actions/* are pinned by major - they're considered trusted. Dependabot
# (.github/dependabot.yml) bumps the pins (SHA + comment) automatically.
jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      # Lets the attest-build-provenance / attest steps write attestations.
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Determine which SQL Server year to build:
      #   - tag push (v2019.0.0)      -> the tag's year (2019)
      #   - manual run with an input  -> that input
      #   - branch push / PR          -> LATEST_VERSION (build the newest)
      # The result drives both the build-args and the `latest` tag decision,
      # so the git tag is the single source of truth for a release's version.
      - name: Determine SQL Server version
        id: msver
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.mssql_version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            year="$INPUT_VERSION"
          elif [ "$REF_TYPE" = "tag" ]; then
            year="${REF_NAME#v}"    # v2019.0.0 -> 2019.0.0
            year="${year%%.*}"      # 2019.0.0  -> 2019
          else
            year="$LATEST_VERSION"
          fi
          # Validate: must be digits only (guards against bad input / injection).
          case "$year" in
            ''|*[!0-9]*) echo "::error::invalid SQL Server year: '$year'"; exit 1 ;;
          esac
          echo "year=${year}" >> "$GITHUB_OUTPUT"
          echo "base=${year}-latest" >> "$GITHUB_OUTPUT"
          echo "Building SQL Server year: ${year} (base mcr.microsoft.com/mssql/server:${year}-latest)"

      # Install the cosign tool except on PR
      - name: Install cosign
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          platforms: linux/amd64

      # Login against Docker Hub
      - name: Log into Docker Hub
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Login against GitHub Container Registry
      - name: Log into GHCR
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          # Never auto-assign `latest`; emit it explicitly below only for the
          # newest year. This keeps `latest` stable regardless of tag-push order.
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && steps.msver.outputs.year == env.LATEST_VERSION }}

      # Build and push Docker image with Buildx (don't push on PR). SQL Server
      # base images are amd64-only, so the image is amd64-only.
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          build-args: |
            MSSQL_VERSION=${{ steps.msver.outputs.base }}
            MSSQL_YEAR=${{ steps.msver.outputs.year }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the resulting Docker image digest except on PRs.
      - name: Sign the published Docker image
        if: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "$TAGS" | xargs -I {} cosign sign --yes {}@"$DIGEST"

      # SLSA build provenance, attached to the pushed image as an OCI referrer.
      # The digest is identical across registries (same manifest content), so
      # the two steps differ only in subject-name. Attests an already-pushed
      # digest, so it's independent of buildx's in-build provenance. Also
      # recorded in this repo's GitHub attestation store.
      - name: Attest provenance (Docker Hub)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      - name: Attest provenance (GHCR)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

      # Software Bill of Materials: scan the pushed image and attest the SPDX
      # SBOM to each registry as an OCI referrer, mirroring the provenance steps.
      - name: Generate SBOM
        if: ${{ env.IS_RELEASE == 'true' }}
        # Package-only SBOM. Syft's default file cataloging enumerates every file
        # in the image, which can push the SPDX past actions/attest's 16 MiB
        # predicate limit (it does on the larger images). selection: none keeps
        # just the packages, which is what an SBOM is actually for.
        env:
          SYFT_FILE_METADATA_SELECTION: none
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Uses the unified actions/attest (actions/attest-sbom is deprecated). The
      # SPDX document is the predicate; predicate-type is the SPDX in-toto type.
      - name: Attest SBOM (Docker Hub)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          predicate-type: https://spdx.dev/Document
          predicate-path: sbom.spdx.json
          push-to-registry: true

      - name: Attest SBOM (GHCR)
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          predicate-type: https://spdx.dev/Document
          predicate-path: sbom.spdx.json
          push-to-registry: true

      # Sync this repo's README to the Docker Hub repository's full description
      # on release (cosmetic; the image is already published above). The curated
      # short description is left untouched (no short-description input).
      # continue-on-error: a description-API failure (e.g. DOCKER_PASSWORD is a
      # PAT lacking description-write scope) must never fail a release that has
      # already pushed the image; check the first release's logs to confirm sync.
      - name: Sync README to Docker Hub description
        if: ${{ env.IS_RELEASE == 'true' }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa  # v5.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ github.repository }}
